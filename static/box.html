<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>收纳盒查看</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        :root {
            --box-accent: #84b59b;
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(243, 212, 170, 0.48), transparent 28%),
                radial-gradient(circle at top right, rgba(191, 225, 216, 0.35), transparent 24%),
                linear-gradient(180deg, #fbf6ee 0%, #f4ecdf 100%);
            color: #2e3a35;
            font-family: "Avenir Next", "Segoe UI Variable", "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                linear-gradient(rgba(126, 152, 141, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(126, 152, 141, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.20), transparent 80%);
            -webkit-mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.20), transparent 80%);
        }

        .box-page-header {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(255, 253, 249, 0.75);
            border-bottom: 1px solid rgba(219, 205, 184, 0.70);
            backdrop-filter: blur(20px) saturate(1.2);
            -webkit-backdrop-filter: blur(20px) saturate(1.2);
            box-shadow: 0 4px 20px rgba(113, 89, 58, 0.04);
        }

        .box-page-header h1 {
            font-weight: 800;
            font-size: 17px;
            letter-spacing: -0.01em;
        }

        .box-page-header p {
            font-size: 12px;
            color: #6e7b75;
            margin-top: 2px;
        }

        .box-page-header a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            background: rgba(216, 239, 232, 0.70);
            padding: 8px 14px;
            border-radius: 12px;
            border: 1px solid rgba(31, 122, 108, 0.12);
            box-shadow: 0 2px 8px rgba(31, 122, 108, 0.08);
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .box-page-header a:hover {
            background: rgba(216, 239, 232, 0.95);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(31, 122, 108, 0.14);
        }

        .box-page-header a:active {
            transform: translateY(0) scale(0.97);
        }

        .box-page-content {
            position: relative;
            z-index: 1;
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        .box-grid {
            display: grid;
            container-type: inline-size;
            gap: 10px;
            padding: 18px;
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(255, 253, 249, 0.98), rgba(241, 232, 216, 0.96));
            border: 1px solid rgba(219, 205, 184, 0.85);
            box-shadow: 0 12px 28px rgba(113, 89, 58, 0.08), 0 4px 8px rgba(113, 89, 58, 0.04);
        }

        .box-cell {
            aspect-ratio: 1;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(8px, 3.5cqi, 13px);
            padding: 8px;
            text-align: center;
            border: 1px solid #d6c8b4;
            box-shadow: 0 4px 8px rgba(113, 89, 58, 0.04);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            font-weight: 600;
            word-break: break-all;
        }

        .box-cell::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.30), transparent);
            pointer-events: none;
            border-radius: 14px 14px 0 0;
        }

        .box-cell:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 8px 16px rgba(113, 89, 58, 0.10);
            z-index: 1;
        }

        .box-cell-empty {
            background: #fffaf2;
            color: #938a78;
        }

        .box-cell-ok {
            background: linear-gradient(180deg, #e0f0e8, #d2e9dd);
            color: #295b47;
            border-color: #8bb49f;
        }

        .box-cell-low {
            background: linear-gradient(180deg, #f7eadb, #f2ddcb);
            color: #8d5831;
            border-color: #d2a177;
        }

        .box-cell-low::after {
            content: "";
            position: absolute;
            top: 6px;
            right: 6px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--danger, #c95d4d);
            box-shadow: 0 0 0 2px rgba(201, 93, 77, 0.15);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.3); }
        }

        .box-cell-name {
            font-weight: 700;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-all;
            position: relative;
            z-index: 1;
        }

        .box-cell-qty {
            font-size: clamp(7px, 2.8cqi, 11px);
            margin-top: 3px;
            opacity: 0.85;
            position: relative;
            z-index: 1;
            font-weight: 600;
        }

        .box-page-footer {
            position: relative;
            z-index: 1;
            padding: 10px 16px;
            text-align: center;
            font-size: 11px;
            color: #9a907d;
            background: rgba(255, 253, 249, 0.60);
            border-top: 1px solid rgba(219, 205, 184, 0.50);
            backdrop-filter: blur(10px);
        }

        /* 加载动画 */
        .box-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 60px 20px;
            color: #6e7b75;
        }

        .box-loading-spinner {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid rgba(31, 122, 108, 0.15);
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 错误状态 */
        .box-error {
            text-align: center;
            padding: 60px 20px;
            color: var(--danger);
        }

        .box-error h2 {
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 8px;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .box-page-header {
                padding: 12px 14px;
            }

            .box-page-header h1 {
                font-size: 15px;
            }

            .box-page-content {
                padding: 12px;
            }

            .box-grid {
                gap: 8px;
                padding: 14px;
                border-radius: 18px;
            }

            .box-cell {
                border-radius: 12px;
                padding: 4px 2px;
                aspect-ratio: unset;
            }

            .box-cell-qty {
                display: none;
            }

            .box-cell-name {
                -webkit-line-clamp: 3;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div id="app">
        <div class="box-page-header">
            <div>
                <h1 id="box-name">加载中...</h1>
                <p id="box-meta"></p>
            </div>
            <a href="/">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                打开管理
            </a>
        </div>
        <div class="box-page-content">
            <div id="grid" class="box-grid" style="display:none;"></div>
            <div id="loading" class="box-loading">
                <div class="box-loading-spinner"></div>
                <span>正在加载收纳盒数据...</span>
            </div>
            <div id="error" class="box-error" style="display:none;">
                <h2>加载失败</h2>
                <p id="error-msg"></p>
            </div>
        </div>
        <div class="box-page-footer">
            电子元器件库存管理系统
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        (async function() {
            const pathMatch = window.location.pathname.match(/\/box\/(\d+)/);
            const boxId = pathMatch ? pathMatch[1] : null;
            if (!boxId) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error-msg').textContent = '无效的收纳盒 ID';
                return;
            }
            try {
                const [box, grid] = await Promise.all([
                    api.get(`/api/boxes/${boxId}`),
                    api.get(`/api/boxes/${boxId}/grid`)
                ]);
                document.getElementById('box-name').textContent = box.name;
                document.getElementById('box-meta').textContent = `${box.rows}\u00d7${box.cols} \u00b7 \u5360\u7528 ${box.occupied_count || 0}/${box.rows * box.cols}`;
                document.documentElement.style.setProperty('--box-accent', box.color || '#84b59b');

                const gridEl = document.getElementById('grid');
                gridEl.style.display = 'grid';
                gridEl.style.gridTemplateColumns = `repeat(${grid.cols}, minmax(0, 1fr))`;

                for (let r = 0; r < grid.rows; r++) {
                    for (let c = 0; c < grid.cols; c++) {
                        const cell = grid.cells[r][c];
                        const el = document.createElement('div');
                        el.className = 'box-cell ' + (cell.component ? (cell.component.quantity <= cell.component.min_stock ? 'box-cell-low' : 'box-cell-ok') : 'box-cell-empty');
                        if (cell.component) {
                            el.innerHTML = `<div class="box-cell-name">${escapeHtml(cell.component.name)}</div><div class="box-cell-qty">${cell.component.quantity}</div>`;
                        } else {
                            el.textContent = cell.label;
                        }
                        gridEl.appendChild(el);
                    }
                }
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error-msg').textContent = e.message;
            }
        })();

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
